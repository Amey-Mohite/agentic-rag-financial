# Brings up Qdrant + the API (with web UI) together for a one-command local demo.
#   docker compose up --build      then open  http://localhost:8000
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC (Python client uses this by default)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - qdrant
    environment:
      # Use the Qdrant-backed config and point it at the qdrant service (matches the k8s setup).
      - RAG_CONFIG=config.k8s.yaml
      - QDRANT_URL=http://qdrant:6333

volumes:
  qdrant_data:
