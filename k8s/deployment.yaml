apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-rag
spec:
  replicas: 2
  selector: { matchLabels: { app: agentic-rag } }
  template:
    metadata: { labels: { app: agentic-rag } }
    spec:
      containers:
        - name: api
          image: REGISTRY/agentic-rag:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: agentic-rag-secrets }   # OPENAI/ANTHROPIC/QDRANT/DATABASE_URL
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: agentic-rag }
spec:
  selector: { app: agentic-rag }
  ports: [{ port: 80, targetPort: 8000 }]
