# ============================================================================
# Agentic RAG configuration. Edit this, not the code.
# Secrets use ${ENV_VAR} and are resolved from the environment at load time.
# ============================================================================
embedding:
  model: text-embedding-3-large
  dims: 3072

generator:
  model: claude-sonnet-4-6
  max_tokens: 1024
  temperature: 0.0
  use_prompt_caching: true        # cache system prompt + tool defs to cut multi-step agent cost

vector_store:
  backend: pgvector                 # qdrant | pgvector
  # --- qdrant settings ---
  url: ${QDRANT_URL}
  api_key: ${QDRANT_API_KEY}
  collection: filings
  # --- pgvector settings (used when backend: pgvector) ---
  dsn: ${DATABASE_URL}            # postgresql://user:pass@host:5432/ragdb
  hnsw_m: 16
  hnsw_ef_construction: 64

chunking:
  strategy: recursive             # fixed | recursive | semantic
  chunk_tokens: 500
  overlap_tokens: 50

retrieval:
  top_k: 5
  candidate_pool: 20
  use_hybrid: true
  use_reranker: true
  reranker_model: BAAI/bge-reranker-v2-m3
  rrf_k: 60
  sparse_backend: splade          # splade | keyword  (splade = true hybrid via fastembed, Qdrant)
  sparse_model: Qdrant/bm42-all-minilm-l6-v2-attentions

agent:
  max_steps: 6

memory:
  enabled: true                   # per-session conversation history for follow-up questions
  max_turns: 6                    # how many recent (user,assistant) exchanges to retain
  backend: memory                 # memory (in-process) | (swap for redis in production)

ingestion:
  extract_tables: true            # PDFs: render tables as Markdown so numbers stay structured
